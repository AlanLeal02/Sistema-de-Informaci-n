<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="Registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <h1>Registro de Usuario</h1>
        <p>Por favor, ingresa tus datos personales para completar el registro en el sistema.</p>
    </header>

    <main class="form-container">
        <form id="userForm">
            
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="nombre">NOMBRE(S)</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ingresa tu nombre">
                </div>
                
                <div class="form-group col-md-6">
                    <label for="apellidoPaterno">APELLIDO PATERNO</label>
                    <input type="text" id="apellidoPaterno" name="apellidoPaterno" required placeholder="Ingresa tu apellido paterno">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="apellidoMaterno">APELLIDO MATERNO</label>
                    <input type="text" id="apellidoMaterno" name="apellidoMaterno" required placeholder="Ingresa tu apellido materno">
                </div>

                <div class="form-group col-md-6">
                    <label for="correo">CORREO ELECTRÓNICO</label>
                    <input type="email" id="correo" name="correo" required placeholder="ejemplo@correo.com">
                </div>
            </div>

            <div class="button-container">
                <a href="Reporte_Enviado_Baches.html" class="submit-button">Enviar</a>
            </div>

        </form>
    </main>

    <footer class="main-footer">
        <p>&copy; Registro Ciudadano. Juntos mejoramos nuestra ciudad.</p>
    </footer>

    <script src="Registro.js"></script>
</body>
</html>
