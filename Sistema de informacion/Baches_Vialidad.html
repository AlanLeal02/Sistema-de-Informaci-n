<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Ciudadano - Baches y Vialidad</title>
    <link rel="stylesheet" href="Estilos_Baches_Vialidad.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <h1>Baches y Vialidad</h1>
            <p>Reporta baches, daños en vialidad o problemas en infraestructura vial.</p>
        </div>
    </header>

    <!-- Ubicación -->
    <section class="location-section">
        <div class="container">
            <div class="location-bar">

                <div class="input-group">
                    <label for="estado">Estado</label>
                    <select id="estado">
                        <option value="">Selecciona un Estado...</option>
                        <option value="CDMX">CDMX</option>
                        <option value="Aguascalientes">Aguascalientes</option>
                        <option value="Baja California">Baja California</option>
                        <option value="Baja California Sur">Baja California Sur</option>
                        <option value="Campeche">Campeche</option>
                        <option value="Chiapas">Chiapas</option>
                        <option value="Chihuahua">Chihuahua</option>
                        <option value="Coahuila">Coahuila</option>
                        <option value="Colima">Colima</option>
                        <option value="Durango">Durango</option>
                        <option value="Guanajuato">Guanajuato</option>
                        <option value="Guerrero">Guerrero</option>
                        <option value="Hidalgo">Hidalgo</option>
                        <option value="Jalisco">Jalisco</option>
                        <option value="Nuevo Leon">Nuevo León</option>
                        <option value="Estado de México">Estado de México</option>
                        <option value="Michoacan">Michoacán</option>
                        <option value="Morelos">Morelos</option>
                        <option value="Nayarit">Nayarit</option>
                        <option value="Oaxaca">Oaxaca</option>
                        <option value="Puebla">Puebla</option>
                        <option value="Queretaro">Querétaro</option>
                        <option value="Quintana Roo">Quintana Roo</option>
                        <option value="San Luis Potosi">San Luis Potosí</option>
                        <option value="Sinaloa">Sinaloa</option>
                        <option value="Sonora">Sonora</option>
                        <option value="Tabasco">Tabasco</option>
                        <option value="Tamaulipas">Tamaulipas</option>
                        <option value="Tlaxcala">Tlaxcala</option>
                        <option value="Veracruz">Veracruz</option>
                        <option value="Yucatan">Yucatán</option>
                        <option value="Zacatecas">Zacatecas</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="municipio">Municipio</label>
                    <select id="municipio" disabled>
                        <option value="">Primero elige un estado...</option>
                    </select>
                </div>

                <div class="input-group address-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" placeholder="Calle, número, colonia...">
                </div>

            </div>
        </div>
    </section>

    <!-- Datos del reporte -->
    <section class="reporte-section">
        <div class="container reporte-container">

            <div class="input-group">
                <label for="descripcion">Descripción del reporte</label>
                <textarea
                    id="descripcion"
                    rows="6"
                    placeholder="Describe el problema que deseas reportar..."
                ></textarea>
            </div>

            <div class="input-group">
                <label for="fotos">Fotografías del reporte</label>
                <input
                    type="file"
                    id="fotos"
                    accept="image/*"
                    multiple
                >
                <small>Puedes seleccionar una o varias imágenes.</small>
            </div>

            <div class="boton-container">
               <a href="Registro.html" class="enviar_reporte">Enviar Reporte</a>
            </div>

        </div>
    </section>

    <footer class="footer">
        <p>&copy; Reporte Ciudadano. Juntos mejoramos nuestra ciudad.</p>
    </footer>

    <script src="JavaScript_Baches_Vialidad.js"></script>

</body>
</html>
